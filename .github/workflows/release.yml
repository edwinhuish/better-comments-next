name: Package and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: Build type to run
        options:
          - dev
          - prod
          - all

permissions:
  contents: write
  checks: write

jobs:

  build-and-release:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
          cache: true

      - name: 📦 Get pnpm cache directory path
        id: pnpm-cache-dir-path
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm i --frozen-lockfile

      - name: 📦 Package extension
        run: npx vsce package

      - name: 🔖 Fetch and identify tags
        id: get_tags
        run: .github/scripts/get-tags.sh

      - name: 📝 Generate changelog
        run: .github/scripts/generate-changelog.sh "${{ steps.get_tags.outputs.current_tag }}" "${{ steps.get_tags.outputs.previous_tag }}"

      - name: 🔄 Create and publish GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          bodyFile: changelog.md
          artifacts: '*.vsix'
          tag: ${{ steps.get_tags.outputs.current_tag }}

      - name: 🚀 Publish to VS Code Marketplace
        run: npx vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: 🚀 Publish to Open VSX
        run: npx ovsx publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
